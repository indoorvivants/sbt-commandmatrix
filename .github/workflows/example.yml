name: Example
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]

jobs:
  example:
    name: Example ${{matrix.ceVersion}} ${{matrix.scalaVersion}} (${{matrix.scalaPlatform}})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        java: [17]
        scalaVersion: ["2_12", "2_13", "3_3_7", "3_8_2"]
        scalaPlatform: ["jvm", "js"]
        ceVersion: ["CE2", "CE3"]
    runs-on: ${{ matrix.os }}
    env:
      BUILD_KEY: ${{matrix.ceVersion}}-${{matrix.scalaVersion}}-${{matrix.scalaPlatform}}
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v3

      - name: Setup java
        uses: actions/setup-java@v3
        with:
          distribution: "adopt"
          java-version: ${{ matrix.java }}

      - name: Setup SBT
        uses: sbt/setup-sbt@v1

      - name: Run tests
        run: |
          cd example
          sbt check-$BUILD_KEY codeQuality-$BUILD_KEY
